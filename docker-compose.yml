version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./ai_pipeline:/app/ai_pipeline
      - ./mom_voice.db:/app/mom_voice.db
      - ./assets:/app/assets
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: rq worker -u redis://redis:6379/0 default
    volumes:
      - ./backend:/app/backend
      - ./ai_pipeline:/app/ai_pipeline
      - ./assets:/app/assets
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
